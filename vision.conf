# vision.conf — Vision HTTPS server configuration
# Lines starting with # are comments.

# Port to listen on (default: 8443)
port = 8443

# TLS certificate and private key (PEM format)
# cert = /etc/vision/cert.pem
# key  = /etc/vision/key.pem

# TCP listen backlog
backlog = 128

# Maximum simultaneous connections
max_conns = 4096
